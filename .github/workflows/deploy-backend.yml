name: Deploy Backend to Hugging Face

# Deploys backend/ to a Hugging Face Docker Space on every backend change.
#
# Strategy: push a CLEAN, single-commit snapshot of the *current* backend/ tree
# (no node_modules, no uploads, no git history). A history-free orphan commit
# guarantees old binary blobs from the monorepo's past can never end up in the
# push pack — which is exactly what Hugging Face's pre-receive hook rejects.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

# Cancel an in-flight deploy if a newer one starts.
concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -eu
          missing=""
          [ -z "${HF_TOKEN:-}" ]    && missing="$missing HF_TOKEN"
          [ -z "${HF_USERNAME:-}" ] && missing="$missing HF_USERNAME"
          [ -z "${HF_SPACE:-}" ]    && missing="$missing HF_SPACE"
          if [ -n "$missing" ]; then
            echo "::error::Missing repo secret(s):$missing — add them under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Guard against binary files (HF rejects them)
        run: |
          set -eu
          bins="$(git ls-tree -r HEAD --name-only | grep '^backend/' \
            | grep -iE '\.(png|jpe?g|jfif|gif|webp|ico|gz|node|pdf|woff2?|ttf|mp4)$' || true)"
          if [ -n "$bins" ]; then
            echo "::error::Binary files are tracked under backend/ — Hugging Face will reject the push:"
            echo "$bins"
            exit 1
          fi
          echo "No tracked binary files under backend/ — safe to deploy."

      - name: Push clean snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          set -eu
          cd backend
          rm -rf .git
          git init -q
          git checkout -q -b main
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add -A                                   # respects backend/.gitignore
          git commit -q -m "Deploy ${GITHUB_SHA} from monorepo"
          git push --force -q \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" \
            main
          echo "✅ Deployed monorepo ${GITHUB_SHA} -> https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}"
