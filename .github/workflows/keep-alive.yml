name: Keep backend awake

# Free Hugging Face Spaces sleep after inactivity and cold-start slowly, which
# surfaces to users as "Something went wrong" at login. This cron pings the
# backend health endpoint on a schedule so the Space stays warm and never sleeps.
#
# Notes / limits:
#  - GitHub cron is best-effort on free runners; a "*/10" schedule can drift by
#    5-15 min. That's fine for keeping a Space awake.
#  - GitHub auto-DISABLES scheduled workflows after ~60 days of no repo activity
#    — just push any commit (or hit "Run workflow") to re-enable it.
#  - This only prevents SLEEP. If the container hits a RUNTIME_ERROR (crash), HF
#    does not auto-restart it — you still need to restart the Space manually.
on:
  schedule:
    - cron: '*/10 * * * *' # every ~10 minutes
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health (wakes + warms the HF Space)
        run: |
          URL="https://faheemnaveed007-roomify-backend.hf.space/api/health"
          # Retry a few times: the first hit may catch the Space cold-starting.
          for attempt in 1 2 3 4 5; do
            code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 90 "$URL" || echo 000)"
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "✅ backend healthy"
              exit 0
            fi
            sleep 25
          done
          echo "⚠️ backend not healthy after retries — it may be crashed (RUNTIME_ERROR), which needs a manual Space restart."
          # Exit 0 so the schedule keeps running and we don't get failure spam.
          exit 0
